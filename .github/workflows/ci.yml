name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_call:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - run: npm ci
      # TypeScript のビルド (dist/*.js を生成)
      - run: npm run build
      # 分割モジュールの純関数ユニットテスト (node:test)
      - run: npm test
      # ESLint (src 全体)
      - run: npm run lint
